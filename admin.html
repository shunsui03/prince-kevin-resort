<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Prince Kevin Hills</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* --- ADMIN DESIGN SYSTEM --- */
        body {
            background-color: #f4f7f6; /* Light greyish background */
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar Styling */
        .admin-nav {
            background-color: #2c5e1a; /* Dark Green */
            color: white;
            padding: 0 50px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .admin-nav h2 { margin: 0; font-family: 'Playfair Display', serif; }
        .admin-nav a {
            color: #d4af37; /* Gold */
            text-decoration: none;
            font-weight: 500;
            margin-left: 20px;
            transition: 0.3s;
        }
        .admin-nav a:hover { color: white; }

        /* Login Box */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #2c5e1a, #1e4412);
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 20px; color: #2c5e1a; font-family: 'Playfair Display', serif; }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-card input:focus { border-color: #2c5e1a; outline: none; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #d4af37;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .login-btn:hover { background-color: #c9a227; }

        /* Dashboard Container */
        .dashboard-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Stats Cards (Optional decorative top part) */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon { font-size: 24px; color: #d4af37; }
        .stat-info h3 { margin: 0; font-size: 28px; color: #333; }
        .stat-info p { margin: 0; color: #777; font-size: 14px; }

        /* Table Card */
        .table-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden; /* To match rounded corners */
        }
        .table-header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            background: #fafafa;
        }
        .table-header h3 { margin: 0; color: #2c5e1a; }

        /* The Table itself */
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead { background-color: #2c5e1a; color: white; }
        th { padding: 15px; text-align: left; font-weight: 500; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #444; vertical-align: top; }
        
        /* Table Row Hover Effect */
        tbody tr:hover { background-color: #f9fcf7; }

        /* Status Badges */
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }
        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-accepted { background-color: #d4edda; color: #155724; }
        .status-declined { background-color: #f8d7da; color: #721c24; }

        /* Action Buttons */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: 0.2s;
        }
        .btn-accept { background-color: #28a745; color: white; }
        .btn-accept:hover { background-color: #218838; }
        .btn-decline { background-color: #dc3545; color: white; }
        .btn-decline:hover { background-color: #c82333; }

        /* Responsive wrapper for table */
        .table-responsive { overflow-x: auto; }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-container" style="display:none;">
        <div class="login-card">
            <h2><i class="fas fa-user-shield"></i> Admin Portal</h2>
            <p style="margin-bottom: 20px; color: #666;">Sign in to manage bookings</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" class="login-btn">Sign In</button>
            <p id="errorMsg" style="color:red; display:none; margin-top:10px; font-size:14px;">Invalid credentials</p>
        </div>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection" style="display:none;">
        <!-- Top Navigation -->
        <nav class="admin-nav">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-mountain"></i>
                <h2>Prince Kevin Hills</h2>
            </div>
            <div>
                <a href="index.html"><i class="fas fa-globe"></i> View Website</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="dashboard-container">
            
            <!-- Stats Cards (Optional nice feature) -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                    <div class="stat-info">
                        <h3 id="totalBookings">0</h3>
                        <p>Total Bookings</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-info">
                        <h3 id="pendingCount">0</h3>
                        <p>Pending</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3 id="acceptedCount">0</h3>
                        <p>Accepted</p>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="table-card">
                <div class="table-header">
                    <h3><i class="fas fa-list"></i> Reservations List</h3>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Customer Info</th>
                                <th>Type</th>
                                <th>Details</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="bookingTableBody">
                            <!-- Data loads here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Firebase Config (Dapat same sa index.html)
        const firebaseConfig = {
        apiKey: "AIzaSyB97AOyincD1oiPtolcP0uQizyA9OoQYE8",
        authDomain: "prince-kevin-resort.firebaseapp.com",
        projectId: "prince-kevin-resort",
        storageBucket: "prince-kevin-resort.firebasestorage.app",
        messagingSenderId: "889431153674",
        appId: "1:889431153674:web:f0008f479de3f64d6d93f3",
        measurementId: "G-JYEVSHYNZ8"
      };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Auth State Observer
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadBookings();
            } else {
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => {
                    document.getElementById('errorMsg').style.display = 'block';
                    console.error(error);
                });
        }

        function logout() { auth.signOut(); }

        function loadBookings() {
            const tbody = document.getElementById('bookingTableBody');
            
            db.collection('bookings').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                tbody.innerHTML = "";
                let pending = 0;
                let accepted = 0;
                let total = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    total++;
                    if(data.status === 'Pending') pending++;
                    if(data.status === 'Accepted') accepted++;

                    const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : 'N/A';
                    
                    let details = '';
                    if(data.type === 'Resort') {
                        details = `<strong>Heads:</strong> ${data.heads}<br><strong>Sched:</strong> ${data.schedule}`;
                    } else {
                        details = `<strong>Heads:</strong> ${data.heads}<br><strong>Tent:</strong> ${data.tent}`;
                    }
                    details += `<br><strong>ATV:</strong> ${data.atv}`;

                    let statusClass = 'status-pending';
                    if(data.status === 'Accepted') statusClass = 'status-accepted';
                    if(data.status === 'Declined') statusClass = 'status-declined';

                    const row = `
                        <tr>
                            <td>${date}</td>
                            <td><strong>${data.name}</strong><br><small>${data.contact}</small></td>
                            <td>${data.type}</td>
                            <td>${details}</td>
                            <td><strong>₱${data.total}</strong></td>
                            <td><span class="status-badge ${statusClass}">${data.status}</span></td>
                            <td>
                                <button class="action-btn btn-accept" onclick="updateStatus('${doc.id}', 'Accepted')"><i class="fas fa-check"></i></button>
                                <button class="action-btn btn-decline" onclick="updateStatus('${doc.id}', 'Declined')"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                // Update stats
                document.getElementById('totalBookings').innerText = total;
                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('acceptedCount').innerText = accepted;
            });
        }

        async function updateStatus(id, status) {
            await db.collection('bookings').doc(id).update({ status: status });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Prince Kevin Hills</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        .admin-container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: 100px auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .status-pending { color: orange; font-weight: bold; }
        .status-accepted { color: green; font-weight: bold; }
        .status-declined { color: red; font-weight: bold; }
        .action-btn { padding: 5px 10px; cursor: pointer; margin-right: 5px; border: none; border-radius: 4px; }
        .accept-btn { background: #27ae60; color: white; }
        .decline-btn { background: #c0392b; color: white; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="login-box">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Admin Email" class="form-input"><br><br>
        <input type="password" id="password" placeholder="Password" class="form-input"><br><br>
        <button onclick="login()" class="btn">Login</button>
        <p id="errorMsg" style="color:red; display:none;">Invalid credentials</p>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" style="display:none;">
        <nav>
            <div class="logo">Admin Dashboard</div>
            <ul>
                <li><a href="index.html">View Website</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>

        <div class="admin-container">
            <h1>Reservations</h1>
            <table id="bookingTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Details</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will load here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Firebase Config (Dapat same sa index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyBxxxxxxx", // Ilagay din dito ang API Key
            authDomain: "prince-kevin-resort.firebaseapp.com",
            projectId: "prince-kevin-resort",
            storageBucket: "prince-kevin-resort.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadBookings();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => {
                    document.getElementById('errorMsg').style.display = 'block';
                    console.error(error);
                });
        }

        function logout() {
            auth.signOut();
        }

        function loadBookings() {
            const tbody = document.querySelector('#bookingTable tbody');
            tbody.innerHTML = ""; // Clear current data

            db.collection('bookings').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : 'N/A';
                    
                    let details = '';
                    if(data.type === 'Resort') {
                        details = `Heads: ${data.heads}<br>Sched: ${data.schedule}`;
                    } else {
                        details = `Heads: ${data.heads}<br>Tent: ${data.tent}`;
                    }
                    details += `<br>ATV: ${data.atv}`;

                    let statusClass = '';
                    if(data.status === 'Accepted') statusClass = 'status-accepted';
                    if(data.status === 'Declined') statusClass = 'status-declined';
                    if(data.status === 'Pending') statusClass = 'status-pending';

                    const row = `
                        <tr>
                            <td>${date}</td>
                            <td>${data.name}<br>(${data.contact})</td>
                            <td>${data.type}</td>
                            <td>${details}</td>
                            <td>₱${data.total}</td>
                            <td class="${statusClass}">${data.status}</td>
                            <td>
                                <button class="action-btn accept-btn" onclick="updateStatus('${doc.id}', 'Accepted')">✓</button>
                                <button class="action-btn decline-btn" onclick="updateStatus('${doc.id}', 'Declined')">✗</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });
        }

        async function updateStatus(id, status) {
            await db.collection('bookings').doc(id).update({
                status: status
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Kevin Hills Resort - Booking</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <header>
        <nav>
            <div class="logo">Prince Kevin Hills</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#booking">Book Now</a></li>
                <li><a href="admin.html">Admin Login</a></li>
            </ul>
        </nav>
        
        <div class="hero" id="home">
            <h1>Prince Kevin Hills Resort</h1>
            <p>Experience nature at its finest.</p>
        </div>
    </header>

    <!-- Booking Section -->
    <section id="booking" class="container">
        <h2>Book Your Stay</h2>
        <div class="booking-form">
            <form id="reservationForm">
                <label>Full Name:</label>
                <input type="text" id="name" required>

                <label>Contact Number:</label>
                <input type="text" id="contact" required>

                <label>Type of Booking:</label>
                <select id="bookingType" onchange="updatePrice()">
                    <option value="resort">Resort</option>
                    <option value="campsite">Campsite</option>
                </select>

                <!-- Resort Options -->
                <div id="resortOptions">
                    <label>Number of Heads (250/head):</label>
                    <input type="number" id="resortHeads" value="1" min="1" onchange="updatePrice()">
                    
                    <label>Schedule:</label>
                    <select id="resortSchedule" onchange="updatePrice()">
                        <option value="day">Day Tour (8AM-6PM) - ₱10,000</option>
                        <option value="night">Night Tour (6PM-6AM) - ₱8,000</option>
                    </select>
                </div>

                <!-- Campsite Options -->
                <div id="campsiteOptions" style="display:none;">
                    <label>Number of Heads (350/head):</label>
                    <input type="number" id="campHeads" value="1" min="1" onchange="updatePrice()">
                    
                    <label>Tent Rental:</label>
                    <select id="tentType" onchange="updatePrice()">
                        <option value="0">No Tent (-)</option>
                        <option value="450">Small Tent - ₱450</option>
                        <option value="650">Medium Tent - ₱650</option>
                        <option value="900">Large Tent - ₱900</option>
                        <option value="1200">Extra Large Tent - ₱1,200</option>
                    </select>
                </div>

                <!-- ATV Add-on -->
                <label>ATV Ride Add-on:</label>
                <select id="atvOption" onchange="updatePrice()">
                    <option value="0">None</option>
                    <option value="200">20 Minutes - ₱200</option>
                    <option value="400">40 Minutes - ₱400</option>
                </select>

                <div class="total-display">
                    <h3>Total Amount: ₱ <span id="totalPrice">0.00</span></h3>
                </div>

                <button type="submit" class="btn">Submit Booking</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 Prince Kevin Hills Resort</p>
    </footer>

    <script>
        // TODO: Palitan ang config na ito ng nakuha mo sa Firebase Console
        const firebaseConfig = {
            aapiKey: "AIzaSyB97AOyincD1oiPtolcP0uQizyA9OoQYE8",
            authDomain: "prince-kevin-resort.firebaseapp.com",
            projectId: "prince-kevin-resort",
            storageBucket: "prince-kevin-resort.firebasestorage.app",
            messagingSenderId: "889431153674",
            appId: "1:889431153674:web:f0008f479de3f64d6d93f3",
            measurementId: "G-JYEVSHYNZ8"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Price Calculator Logic
        function updatePrice() {
            let total = 0;
            const type = document.getElementById('bookingType').value;
            const atv = parseInt(document.getElementById('atvOption').value);

            if (type === 'resort') {
                const heads = parseInt(document.getElementById('resortHeads').value) || 0;
                const schedule = document.getElementById('resortSchedule').value;
                const entrance = heads * 250;
                const baseRate = schedule === 'day' ? 10000 : 8000;
                total = entrance + baseRate;
            } else {
                const heads = parseInt(document.getElementById('campHeads').value) || 0;
                const tent = parseInt(document.getElementById('tentType').value);
                const entrance = heads * 350;
                total = entrance + tent;
            }

            total += atv;
            document.getElementById('totalPrice').innerText = total.toLocaleString('en-US');
        }

        // Toggle Form Visibility
        document.getElementById('bookingType').addEventListener('change', function() {
            if (this.value === 'resort') {
                document.getElementById('resortOptions').style.display = 'block';
                document.getElementById('campsiteOptions').style.display = 'none';
            } else {
                document.getElementById('resortOptions').style.display = 'none';
                document.getElementById('campsiteOptions').style.display = 'block';
            }
            updatePrice();
        });

        // Initial calc
        updatePrice();

        // Form Submission
        document.getElementById('reservationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const type = document.getElementById('bookingType').value;
            const name = document.getElementById('name').value;
            const contact = document.getElementById('contact').value;
            const atvText = document.getElementById('atvOption').options[document.getElementById('atvOption').selectedIndex].text;
            const total = document.getElementById('totalPrice').innerText;

            let bookingDetails = {};

            if(type === 'resort') {
                bookingDetails = {
                    name: name,
                    contact: contact,
                    type: 'Resort',
                    heads: document.getElementById('resortHeads').value,
                    schedule: document.getElementById('resortSchedule').options[document.getElementById('resortSchedule').selectedIndex].text,
                    atv: atvText,
                    total: total,
                    status: 'Pending',
                    timestamp: new Date()
                };
            } else {
                bookingDetails = {
                    name: name,
                    contact: contact,
                    type: 'Campsite',
                    heads: document.getElementById('campHeads').value,
                    tent: document.getElementById('tentType').options[document.getElementById('tentType').selectedIndex].text,
                    atv: atvText,
                    total: total,
                    status: 'Pending',
                    timestamp: new Date()
                };
            }

            try {
                await db.collection('bookings').add(bookingDetails);
                alert('Booking submitted successfully! Please wait for confirmation.');
                document.getElementById('reservationForm').reset();
                updatePrice();
            } catch (error) {
                console.error("Error: ", error);
                alert('Error saving booking. Check console.');
            }
            
            submitBtn.innerText = "Submit Booking";
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
